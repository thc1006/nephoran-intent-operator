server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to intentd backend
    location /tmf-api/ {
        proxy_pass http://intentd:8080;
    }
    location /internal/ {
        proxy_pass http://intentd:8080;
    }
    location /api/ {
        proxy_pass http://intentd:8080;
    }
    location /healthz {
        proxy_pass http://intentd:8080;
    }
}
