---
apiVersion: v1
kind: ConfigMap
metadata:
  name: intent-schema
  namespace: nephoran-system
  labels:
    app: intent-ingest
data:
  intent.schema.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "NetworkIntent",
      "type": "object",
      "required": ["apiVersion", "kind", "metadata", "spec"],
      "properties": {
        "apiVersion": {
          "type": "string",
          "enum": ["intent.nephoran.com/v1alpha1"]
        },
        "kind": {
          "type": "string",
          "enum": ["NetworkIntent"]
        },
        "metadata": {
          "type": "object",
          "required": ["name"],
          "properties": {
            "name": {"type": "string"},
            "namespace": {"type": "string", "default": "default"}
          }
        },
        "spec": {
          "type": "object",
          "required": ["intent_type", "target"],
          "properties": {
            "intent_type": {
              "type": "string",
              "enum": ["scaling", "deployment", "service", "configuration"]
            },
            "target": {"type": "string"},
            "replicas": {"type": "integer", "minimum": 0},
            "namespace": {"type": "string"},
            "target_resources": {
              "type": "array",
              "items": {"type": "string"}
            },
            "source": {"type": "string", "default": "user"},
            "status": {"type": "string", "default": "pending"}
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-ingest
  namespace: nephoran-system
  labels:
    app: intent-ingest
    component: intent-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intent-ingest
  template:
    metadata:
      labels:
        app: intent-ingest
        component: intent-processor
    spec:
      serviceAccountName: nephoran-controller-manager
      containers:
      - name: intent-ingest
        image: localhost:5000/nephoran-intent-ingest:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: MODE
          value: "llm"
        - name: PROVIDER
          value: "mock"
        - name: OLLAMA_URL
          value: "http://ollama.ollama:11434"
        - name: RAG_URL
          value: "http://rag-service.rag-service:8000"
        - name: LOG_LEVEL
          value: "info"
        args:
        - --addr=:8080
        - --mode=llm
        - --provider=mock
        - --handoff=/var/nephoran/handoff
        - --schema=/app/docs/contracts/intent.schema.json
        volumeMounts:
        - name: handoff
          mountPath: /var/nephoran/handoff
        - name: schema
          mountPath: /app/docs/contracts
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
      volumes:
      - name: handoff
        emptyDir: {}
      - name: schema
        configMap:
          name: intent-schema
---
apiVersion: v1
kind: Service
metadata:
  name: intent-ingest-service
  namespace: nephoran-system
  labels:
    app: intent-ingest
spec:
  type: ClusterIP
  selector:
    app: intent-ingest
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
