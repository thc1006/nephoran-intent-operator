# O-RAN SC KPI Monitor xApp Descriptor
# Version: 1.0.0
# Compatible with: O-RAN SC Bronze/Cherry releases

schema: "1.0.0"
name: kpimon
version: "1.0.0"

containers:
  - name: kpimon
    image:
      registry: localhost:5000
      name: kpimon-xapp
      tag: v1
    command: ["/kpimon"]
    args:
      - --rmr-src-id=service-ricplt-kpimon-rmr
      - --rmr-port=4560
      - --http-port=8080
      - --log-level=info

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

messaging:
  ports:
    - name: rmr-data
      container: kpimon
      port: 4560
      description: "RMR data port for RIC messaging"
      rxMessages:
        - RIC_SUB_RESP
        - RIC_SUB_FAILURE
        - RIC_SUB_DEL_RESP
        - RIC_INDICATION
      txMessages:
        - RIC_SUB_REQ
        - RIC_SUB_DEL_REQ
    - name: rmr-route
      container: kpimon
      port: 4561
      description: "RMR route port"

controls:
  requestorId: 10
  instanceId: 1
  ranFunctionId: 0

metrics:
  url: /metrics
  port: 8080

rmr:
  protPort: "tcp:4560"
  maxSize: 8192
  numWorkers: 1
  txMessages:
    - "RIC_SUB_REQ"
    - "RIC_SUB_DEL_REQ"
  rxMessages:
    - "RIC_SUB_RESP"
    - "RIC_INDICATION"
    - "RIC_SUB_FAILURE"
    - "RIC_SUB_DEL_RESP"
