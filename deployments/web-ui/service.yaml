---
apiVersion: v1
kind: Service
metadata:
  name: nephoran-web-ui
  namespace: nephoran-system
  labels:
    app: nephoran-web-ui
spec:
  type: ClusterIP
  selector:
    app: nephoran-web-ui
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
# Optional: NodePort service for external access
apiVersion: v1
kind: Service
metadata:
  name: nephoran-web-ui-nodeport
  namespace: nephoran-system
  labels:
    app: nephoran-web-ui
spec:
  type: NodePort
  selector:
    app: nephoran-web-ui
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30090
    protocol: TCP
