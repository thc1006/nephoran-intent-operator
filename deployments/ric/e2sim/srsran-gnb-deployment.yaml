---
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-gnb-config
  namespace: ricxapp
data:
  gnb.conf: |
    # OAI gNB Configuration for E2 Agent Integration
    # Libconfig format (not YAML!)

    Active_gNBs = ( "gNB-OAI-E2");

    gNBs = (
      {
        gNB_ID = 0xe00;
        gNB_name = "gNB-OAI-E2";
        tracking_area_code = 1;

        plmn_list = (
          {
            mcc = 001;
            mnc = 01;
            mnc_length = 2;
          }
        );

        nr_cellid = 12345678L;

        amf_ip_address = (
          {
            ipv4 = "127.0.0.1";
            ipv6 = "192:168:30::17";
            active = "yes";
            preference = "ipv4";
          }
        );

        NETWORK_INTERFACES = {
          GNB_INTERFACE_NAME_FOR_NG_AMF = "lo";
          GNB_IPV4_ADDRESS_FOR_NG_AMF = "127.0.0.1/8";
          GNB_INTERFACE_NAME_FOR_NGU = "lo";
          GNB_IPV4_ADDRESS_FOR_NGU = "127.0.0.1/8";
          GNB_PORT_FOR_S1U = 2152;
        };

        e2_agent = {
          near_ric_ip_addr = "service-ricplt-e2term-sctp-alpha.ricplt.svc.cluster.local";
          sm_dir = "/usr/local/lib/flexric/";
        };
      }
    );

    security = {
      ciphering_algorithms = ( "nea0" );
      integrity_algorithms = ( "nia2", "nia0" );
    };

    log_config = {
      global_log_level = "info";
      global_log_verbosity = "medium";
    };

    SCTP = {
      SCTP_INSTREAMS = 2;
      SCTP_OUTSTREAMS = 2;
    };

    MACRLCs = (
      {
        num_cc = 1;
        tr_s_preference = "local_L1";
        tr_n_preference = "local_RRC";
      }
    );

    L1s = (
      {
        num_cc = 1;
        tr_n_preference = "local_mac";
      }
    );

    RUs = (
      {
        local_rf = "yes";
        nb_tx = 1;
        nb_rx = 1;
        att_tx = 0;
        att_rx = 0;
        bands = [78];
        max_pdschReferenceSignalPower = -27;
        max_rxgain = 114;
        eNB_instances = [0];
        sdr_addrs = "type=zmq";
      }
    );

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srsran-gnb
  namespace: ricxapp
  labels:
    app: srsran-gnb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: srsran-gnb
  template:
    metadata:
      labels:
        app: srsran-gnb
    spec:
      containers:
      - name: gnb
        image: arorasagar/testing-images:oai-gnb-e2-agent
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            set -e
            echo "==================================="
            echo "srsRAN gNB E2 Agent Starting..."
            echo "==================================="
            echo "E2 Term Service: service-ricplt-e2term-sctp-alpha.ricplt.svc.cluster.local:36422"
            echo ""

            # Check if E2 Term is reachable (DNS resolution)
            echo "Checking E2 Term DNS resolution..."
            nslookup service-ricplt-e2term-sctp-alpha.ricplt.svc.cluster.local || true
            echo ""

            # Wait for E2 Term to be ready
            echo "Waiting for E2 Term to be ready..."
            sleep 5

            # Create config directory
            mkdir -p /etc/srsran

            # Copy config from ConfigMap (libconfig format now!)
            if [ -f /config/gnb.conf ]; then
              cp /config/gnb.conf /etc/srsran/gnb.conf
              echo "Configuration loaded from ConfigMap (libconfig format)"
            else
              echo "WARNING: Config file not found, using defaults"
            fi

            echo ""
            echo "Starting OAI gNB with E2 agent enabled..."
            echo "Press Ctrl+C to stop"
            echo ""

            # Run OAI gNB with E2 agent enabled
            # Note: OAI binary is nr-softmodem with libconfig format
            exec /opt/oai-gnb/bin/nr-softmodem -O /etc/srsran/gnb.conf
        volumeMounts:
        - name: config
          mountPath: /config
        - name: logs
          mountPath: /tmp
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 2Gi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_NICE
      volumes:
      - name: config
        configMap:
          name: srsran-gnb-config
      - name: logs
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: srsran-gnb
  namespace: ricxapp
  labels:
    app: srsran-gnb
spec:
  type: ClusterIP
  ports:
  - port: 36422
    protocol: SCTP
    targetPort: 36422
    name: e2-sctp
  selector:
    app: srsran-gnb
