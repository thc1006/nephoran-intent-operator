# OAI gNB Complete Configuration for E2 Agent
# Libconfig format with servingCellConfigCommon

Active_gNBs = ( "gNB-OAI-E2");

gNBs = (
  {
    gNB_ID = 0xe00;
    gNB_name = "gNB-OAI-E2";
    tracking_area_code = 1;

    plmn_list = (
      {
        mcc = 001;
        mnc = 01;
        mnc_length = 2;
      }
    );

    nr_cellid = 12345678L;

    # Serving cell configuration
    servingCellConfigCommon = (
      {
        physCellId = 0;

        # Downlink configuration
        dl_frequencyBand = 78;
        dl_absoluteFrequencySSB = 633024;
        dl_absoluteFrequencyPointA = 632628;
        dl_carrierBandwidth = 106;
        dl_subcarrierSpacing = 1;  # 30kHz

        # Uplink configuration
        ul_frequencyBand = 78;
        ul_carrierBandwidth = 106;
        ul_subcarrierSpacing = 1;  # 30kHz
        pMax = 20;

        # Initial DL BWP
        initialDLBWPlocationAndBandwidth = 28875;
        initialDLBWPsubcarrierSpacing = 1;
        initialDLBWPcontrolResourceSetZero = 11;
        initialDLBWPsearchSpaceZero = 0;

        # Initial UL BWP
        initialULBWPlocationAndBandwidth = 28875;
        initialULBWPsubcarrierSpacing = 1;

        # RACH configuration
        prach_ConfigurationIndex = 98;
        prach_msg1_SubcarrierSpacing = 1;
        restrictedSetConfig = 0;
        msg3_transformPrecoder = 0;

        # SSB configuration
        ssb_PositionsInBurst = 0x80;
        ssb_periodicityServingCell = 10;
        ss_PBCH_BlockPower = -25;

        # TDD pattern
        dl_UL_TransmissionPeriodicity = 6;
        nrofDownlinkSlots = 7;
        nrofDownlinkSymbols = 6;
        nrofUplinkSlots = 2;
        nrofUplinkSymbols = 4;
      }
    );

    amf_ip_address = (
      {
        ipv4 = "127.0.0.1";
        active = "yes";
        preference = "ipv4";
      }
    );

    NETWORK_INTERFACES = {
      GNB_INTERFACE_NAME_FOR_NG_AMF = "lo";
      GNB_IPV4_ADDRESS_FOR_NG_AMF = "127.0.0.1/8";
      GNB_INTERFACE_NAME_FOR_NGU = "lo";
      GNB_IPV4_ADDRESS_FOR_NGU = "127.0.0.1/8";
      GNB_PORT_FOR_S1U = 2152;
    };

    e2_agent = {
      near_ric_ip_addr = "service-ricplt-e2term-sctp-alpha.ricplt.svc.cluster.local";
      sm_dir = "/usr/local/lib/flexric/";
    };
  }
);

security = {
  ciphering_algorithms = ( "nea0" );
  integrity_algorithms = ( "nia2", "nia0" );
};

log_config = {
  global_log_level = "info";
  global_log_verbosity = "medium";
};

SCTP = {
  SCTP_INSTREAMS = 2;
  SCTP_OUTSTREAMS = 2;
};

MACRLCs = (
  {
    num_cc = 1;
    tr_s_preference = "local_L1";
    tr_n_preference = "local_RRC";
  }
);

L1s = (
  {
    num_cc = 1;
    tr_n_preference = "local_mac";
  }
);

RUs = (
  {
    local_rf = "yes";
    nb_tx = 1;
    nb_rx = 1;
    att_tx = 0;
    att_rx = 0;
    bands = [78];
    max_pdschReferenceSignalPower = -27;
    max_rxgain = 114;
    eNB_instances = [0];
    sdr_addrs = "type=zmq";
  }
);
