# OAI gNB Configuration for E2 Agent Integration
# Minimal config for E2 connectivity testing with Near-RT RIC

Active_gNBs = ( "gNB-OAI-E2");

# gNB parameters:
gNBs = (
  {
    gNB_ID = 0xe00;
    gNB_name = "gNB-OAI-E2";

    # Tracking area code
    tracking_area_code = 1;

    # PLMN configuration
    plmn_list = (
      {
        mcc = 001;
        mnc = 01;
        mnc_length = 2;
      }
    );

    # 5G NR Cell configuration
    nr_cellid = 12345678L;

    # AMF configuration
    amf_ip_address = (
      {
        ipv4 = "127.0.0.1";  # Placeholder - not used for E2 only mode
        ipv6 = "192:168:30::17";
        active = "yes";
        preference = "ipv4";
      }
    );

    # Network interfaces (placeholder for E2 only)
    NETWORK_INTERFACES = {
      GNB_INTERFACE_NAME_FOR_NG_AMF = "lo";
      GNB_IPV4_ADDRESS_FOR_NG_AMF = "127.0.0.1/8";
      GNB_INTERFACE_NAME_FOR_NGU = "lo";
      GNB_IPV4_ADDRESS_FOR_NGU = "127.0.0.1/8";
      GNB_PORT_FOR_S1U = 2152;
    };

    # E2 Agent Configuration (FlexRIC compatible)
    e2_agent = {
      near_ric_ip_addr = "service-ricplt-e2term-sctp-alpha.ricplt.svc.cluster.local";
      sm_dir = "/usr/local/lib/flexric/";
    };
  }
);

# Security configuration
security = {
  ciphering_algorithms = ( "nea0" );
  integrity_algorithms = ( "nia2", "nia0" );
};

# Logging configuration
log_config = {
  global_log_level = "info";
  global_log_verbosity = "medium";
};

# SCTP configuration
SCTP = {
  SCTP_INSTREAMS = 2;
  SCTP_OUTSTREAMS = 2;
};

# L1/L2 configuration (minimal for RF-less testing)
MACRLCs = (
  {
    num_cc = 1;
    tr_s_preference = "local_L1";
    tr_n_preference = "local_RRC";
  }
);

L1s = (
  {
    num_cc = 1;
    tr_n_preference = "local_mac";
  }
);

# Radio Unit (ZMQ for simulation)
RUs = (
  {
    local_rf = "yes";
    nb_tx = 1;
    nb_rx = 1;
    att_tx = 0;
    att_rx = 0;
    bands = [78];
    max_pdschReferenceSignalPower = -27;
    max_rxgain = 114;
    eNB_instances = [0];
    sdr_addrs = "type=zmq";
  }
);
