apiVersion: apps/v1
kind: Deployment
metadata:
  name: free5gc-upf
  namespace: free5gc
  labels:
    app.kubernetes.io/name: free5gc-upf
    app.kubernetes.io/managed-by: nephio
    app.kubernetes.io/part-of: llm-nephio-oran
    oran.ai/component: free5gc-upf
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: free5gc-upf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: free5gc-upf
        app.kubernetes.io/managed-by: nephio
        app.kubernetes.io/part-of: llm-nephio-oran
        oran.ai/component: free5gc-upf
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: free5gc-upf
        image: free5gc/upf:v3.3.0
        ports:
        - containerPort: 2152
          protocol: UDP
        resources:
          requests:
            cpu: '1'
            memory: 1Gi
          limits:
            cpu: '1'
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
