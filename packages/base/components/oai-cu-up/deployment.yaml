apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-cu-up
  namespace: oran
  labels:
    app.kubernetes.io/name: oai-cu-up
    app.kubernetes.io/managed-by: nephio
    app.kubernetes.io/part-of: llm-nephio-oran
    oran.ai/component: oai-cu-up
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oai-cu-up
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oai-cu-up
        app.kubernetes.io/managed-by: nephio
        app.kubernetes.io/part-of: llm-nephio-oran
        oran.ai/component: oai-cu-up
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: oai-cu-up
        image: oaisoftwarealliance/oai-gnb:develop
        ports:
        - containerPort: 2152
          protocol: UDP
        resources:
          requests:
            cpu: '2'
            memory: 2Gi
          limits:
            cpu: '2'
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
