apiVersion: apps/v1
kind: Deployment
metadata:
  name: ric-ric-ts-edge01-urllc-i001
  namespace: ricplt
  labels: &id001
    oran.ai/intent-id: intent-20260305-2410
    oran.ai/slice: urllc
    oran.ai/site: edge01
    oran.ai/component: ric-ts
    app.kubernetes.io/managed-by: nephio
    app.kubernetes.io/part-of: llm-nephio-oran
    app.kubernetes.io/name: ric-ts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ric-ts
      oran.ai/intent-id: intent-20260305-2410
  template:
    metadata:
      labels: *id001
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ric-ts
        image: nexus3.o-ran-sc.org:10002/o-ran-sc/ric-app-ts:1.2.1
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
